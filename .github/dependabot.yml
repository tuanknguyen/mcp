# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

# Ensure the file passes validation:
# ```shell
# % npx @bugron/validate-dependabot-yaml .github/dependabot.yml
# ```

version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps): update github-actions"
    groups:
      github-actions-version-updates:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps): update uv"
    groups:
      uv-version-updates:
        # Collapse this dependency's bump across every matched directory into a
        # single PR. Without this, `directories: ["**/*"]` groups only WITHIN
        # each directory.
        group-by: dependency-name
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps): update npm"
    groups:
      npm-version-updates:
        # One PR per dependency across all directories (see uv note above).
        group-by: dependency-name
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps): update docker images"
    groups:
      docker-version-updates:
        # One PR per image across all directories (see uv note above).
        group-by: dependency-name
        patterns:
          - "*"
